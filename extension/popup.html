<!DOCTYPE html>
<html>

<head>
  <style>
    body {
      width: 320px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: #f9fafb;
    }

    h2 {
      margin-top: 0;
      color: #1f2937;
      font-size: 18px;
    }

    p {
      color: #6b7280;
      font-size: 14px;
      margin-bottom: 16px;
    }

    textarea {
      width: 100%;
      height: 100px;
      padding: 8px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-family: monospace;
      font-size: 12px;
      margin-bottom: 12px;
      resize: vertical;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      background-color: #4f46e5;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 6px;
      font-weight: 500;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    button:hover {
      background-color: #4338ca;
    }

    #status {
      margin-top: 12px;
      font-size: 13px;
      text-align: center;
      display: none;
    }

    .success {
      color: #059669;
    }

    .error {
      color: #dc2626;
    }
  </style>
</head>

<body>
  <h2>Sync with iOS App</h2>
  <p>1. Open App > Settings > Sync<br>2. Copy Sync Data<br>3. Paste below:</p>

  <textarea id="authData" placeholder='Paste authentication data here...'></textarea>
  <button id="saveBtn">Sync Account</button>
  <div id="status"></div>

  <script src="popup.js"></script>
</body>

</html>
